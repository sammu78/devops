name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  package-and-release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Build deployable package
        run: |
          zip -r flask-app-${{ github.sha }}.zip app.py requirements.txt templates static tests

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: flask-app-package
          path: flask-app-${{ github.sha }}.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          generate_release_notes: true
          files: flask-app-${{ github.sha }}.zip
